<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>포지마스터 펫 계산기</title>

<style>
body{font-family:Arial;background:#0f0f0f;color:white;padding:30px;}
h1{color:#ffd700;}
.card{background:#1e1e1e;padding:20px;margin-bottom:20px;border-radius:10px;}
select,input{padding:6px;margin:3px;}
.result{font-size:20px;color:#00ffc3;margin-top:10px;}
.stat{color:#ffd700;margin-top:5px;}
table{border-collapse:collapse;width:100%;}
td,th{border:1px solid #444;padding:6px;text-align:center;}
th{background:#333;}
</style>

</head>

<body>

<h1>포지마스터 펫 계산기</h1>
<p>제작자 : 21서버 Dominant 클랜 리더 Troud</p>

<div class="card">
<h2>기술 트리 티어 설정</h2>
<div id="tiers"></div>
</div>

<div class="card">
<h2>승천 / 레벨 설정</h2>

현재 승천
<select id="curAsc">
<option>0</option><option>1</option><option>2</option><option>3</option>
</select>

현재 레벨
<input id="curLvl" type="number" value="1">

<br><br>

목표 승천
<select id="tarAsc">
<option>0</option><option>1</option><option>2</option><option>3</option>
</select>

목표 레벨
<input id="tarLvl" type="number" value="10">

</div>

<div class="card">
<h2>계산 결과</h2>

<div class="result" id="summonCount"></div>
<div class="result" id="eggResult"></div>

</div>

<div class="card">
<h2>레벨별 필요 소환 횟수</h2>

<table id="summonTable">
<tr>
<th>레벨</th>
<th>필요 소환 횟수</th>
</tr>
</table>

</div>

<script>

// 🔥 소환 횟수 함수
function getSummonCount(lvl){

// 2~21
if(lvl===2) return 2
if(lvl===3) return 3
if(lvl===4) return 4
if(lvl===5) return 5
if(lvl===6) return 6
if(lvl===7) return 7
if(lvl===8) return 8
if(lvl===9) return 9
if(lvl===10) return 10
if(lvl===11) return 11
if(lvl===12) return 12
if(lvl===13) return 13
if(lvl===14) return 14
if(lvl===15) return 15
if(lvl===16) return 16
if(lvl===17) return 17
if(lvl===18) return 18
if(lvl===19) return 19
if(lvl===20) return 20
if(lvl===21) return 21

// 22~100 → 22
return 22
}
// UI
function createUI(){

let html="<b>추가 알 기회</b><br>"

for(let i=1;i<=5;i++){
html+="T"+i+" <select id='tier"+i+"' onchange='handleTier("+i+")'>"
for(let j=0;j<=5;j++){
html+="<option>"+j+"</option>"
}
html+="</select> "
}

html+="<div class='stat' id='tierStat'></div>"

document.getElementById("tiers").innerHTML=html
}

// 티어 로직
function handleTier(t){

let val=Number(document.getElementById("tier"+t).value)

if(val===0){
for(let i=t+1;i<=5;i++){
document.getElementById("tier"+i).value=0
}
}

if(val>=2){
for(let i=1;i<t;i++){
let el=document.getElementById("tier"+i)
if(Number(el.value)===0)el.value=5
}
}

calculate()
}

function getBonus(){

let sum=0
for(let i=1;i<=5;i++){
sum+=Number(document.getElementById("tier"+i).value)
}

return sum*0.02
}

// 계산
function calculate(){

let bonus=getBonus()

document.getElementById("tierStat").innerText=
"현재 효과 : "+(bonus*100).toFixed(1)+"%"

let curAsc=Number(curAscEl.value)
let tarAsc=Number(tarAscEl.value)
let curLvl=Number(curLvlEl.value)
let tarLvl=Number(tarLvlEl.value)

let total=0

while(true){

if(curAsc===tarAsc){

for(let i=curLvl+1;i<=tarLvl;i++){
total+=getSummonCount(i)
}

break
}

for(let i=curLvl+1;i<=100;i++){
total+=getSummonCount(i)
}

curAsc++
curLvl=1
}

// 🔥 필요 알 계산
let eggs=total*100
let finalEggs=eggs/(1+bonus)

let eggCeil=Math.ceil(finalEggs)
let eggK=(eggCeil/1000).toFixed(1).replace(/\.0$/,"")

summonCount.innerText="필요 소환 횟수 : "+total.toLocaleString()
eggResult.innerText="필요 알 : "+eggCeil.toLocaleString()+" ("+eggK+"k)"
}

// 표
function createTable(){

let html=""

for(let i=1;i<=100;i++){

html+="<tr>"
html+="<td>"+i+"</td>"

if(i===1){
html+="<td>-</td>"
}else{
html+="<td>"+getSummonCount(i)+"</td>"
}

html+="</tr>"
}

document.getElementById("summonTable").innerHTML+=html
}

// DOM
const curAscEl=document.getElementById("curAsc")
const tarAscEl=document.getElementById("tarAsc")
const curLvlEl=document.getElementById("curLvl")
const tarLvlEl=document.getElementById("tarLvl")

const summonCount=document.getElementById("summonCount")
const eggResult=document.getElementById("eggResult")

document.querySelectorAll("input,select").forEach(el=>{
el.oninput=calculate
})

createUI()
createTable()
calculate()

</script>

</body>
</html>
